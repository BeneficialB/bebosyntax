<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0"/>
<title>Bebo Satzbau-Trainer</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --toolbar-h: 52px;
  --bottom-h: 90px;
  --bg: #181c28;
  --canvas-bg: #0f1219;
  --panel: #1e2336;
  --border: #2a3050;
  --text: #dde3f5;
  --muted: #5a6480;
  --accent: #5b8cff;
}
html, body { height: 100%; overflow: hidden; font-family: \'Segoe UI\', system-ui, sans-serif; background: var(--bg); color: var(--text); }

#toolbar {
  height: var(--toolbar-h);
  background: #131726;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px; padding: 0 14px;
  z-index: 200; position: relative; flex-shrink: 0;
}
#toolbar h1 { font-size: .9rem; font-weight: 800; color: var(--accent); margin-right: 4px; white-space: nowrap; }
.sep { width: 1px; height: 26px; background: var(--border); margin: 0 3px; }
.tbtn {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 11px; border-radius: 7px;
  background: #252d44; border: 1px solid var(--border);
  color: var(--text); font-size: .78rem; font-weight: 600;
  cursor: pointer; white-space: nowrap; transition: background .12s, border-color .12s;
  user-select: none;
}
.tbtn:hover { background: #2e3a58; border-color: #5b8cff55; }
.tbtn.active { background: #1e3a8a; border-color: var(--accent); color: #fff; }
.tbtn.danger { color: #e05c7a; }
.tbtn.danger:hover { background: #2e1f2a; }
.tbtn:disabled { opacity: .35; cursor: default; pointer-events: none; }

#sentence-bar { display: flex; align-items: center; gap: 8px; flex: 1; max-width: 520px; }
#sentence-input {
  flex: 1; padding: 7px 12px;
  background: #0f1219; border: 1.5px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: .88rem; outline: none;
  transition: border-color .15s;
}
#sentence-input:focus { border-color: var(--accent); }
#sentence-input::placeholder { color: var(--muted); }

#main { display: flex; height: calc(100vh - var(--toolbar-h) - var(--bottom-h)); position: relative; }

#canvas {
  flex: 1; position: relative; overflow: hidden;
  background: var(--canvas-bg);
  background-image: radial-gradient(circle, #ffffff09 1px, transparent 1px);
  background-size: 26px 26px;
}

.pos-zone {
  position: absolute; border: 2px dashed #5b8cff55;
  background: transparent; border-radius: 10px;
  min-width: 60px; min-height: 50px;
  cursor: move; user-select: none;
}
.pos-zone:hover { border-color: #5b8cffaa; }
.pos-zone-label {
  position: absolute; top: 5px; left: 8px;
  font-size: 1rem; font-weight: 800; color: #5b8cffaa;
  letter-spacing: .8px; text-transform: uppercase;
  outline: none; cursor: text; min-width: 20px;
}
.pos-zone .del-zone {
  position: absolute; top: 3px; right: 6px;
  font-size: .65rem; color: rgba(255,255,255,.4); cursor: pointer;
  opacity: 0; transition: opacity .15s; line-height: 1;
}
.pos-zone:hover .del-zone { opacity: 1; }

.rh { position: absolute; z-index: 5; background: rgba(91,140,255,.55); border-radius: 2px; }
.rh-n  { top:-3px;    left:18px;   right:18px;  height:6px;  cursor:n-resize;  }
.rh-s  { bottom:-3px; left:18px;   right:18px;  height:6px;  cursor:s-resize;  }
.rh-w  { left:-3px;   top:18px;    bottom:18px; width:6px;   cursor:w-resize;  }
.rh-e  { right:-3px;  top:18px;    bottom:18px; width:6px;   cursor:e-resize;  }
.rh-nw { top:-4px;    left:-4px;   width:10px;  height:10px; cursor:nw-resize; border-radius:3px; }
.rh-ne { top:-4px;    right:-4px;  width:10px;  height:10px; cursor:ne-resize; border-radius:3px; }
.rh-sw { bottom:-4px; left:-4px;   width:10px;  height:10px; cursor:sw-resize; border-radius:3px; }
.rh-se { bottom:-4px; right:-4px;  width:10px;  height:10px; cursor:se-resize; border-radius:3px; }
.pos-zone .rh { opacity:0; transition: opacity .15s; }
.pos-zone:hover .rh { opacity:1; }
.pos-zone.color-target-active { outline: 3px solid rgba(255,220,50,.6); }

:root { --card-scale: 1; }
.word-card {
  position: absolute; display: flex; flex-direction: column; align-items: center;
  padding: calc(8px * var(--card-scale)) calc(16px * var(--card-scale)) calc(6px * var(--card-scale));
  border-radius: 10px; cursor: grab;
  user-select: none; z-index: 30;
  box-shadow: 0 3px 14px rgba(0,0,0,.5);
  border: 2px solid rgba(255,255,255,.1);
  transition: border-color .12s, box-shadow .12s;
  min-width: 50px; text-align: center;
}
.word-card:active { cursor: grabbing; }
.word-card.color-target-active { border-color: rgba(255,255,255,.7) !important; box-shadow: 0 0 0 3px rgba(255,220,50,.5), 0 3px 14px rgba(0,0,0,.5); }
.word-card .wt  { font-size: calc(1.05rem * var(--card-scale)); font-weight: 700; color: #fff; pointer-events: none; }
.card-tag-sel {
  font-size: calc(.58rem * var(--card-scale));
  background: rgba(0,0,0,.3); color: rgba(255,255,255,.8);
  border: none; border-radius: 4px; margin-top: 3px;
  padding: calc(1px * var(--card-scale)) calc(3px * var(--card-scale));
  cursor: pointer; outline: none; appearance: none; -webkit-appearance: none;
  text-align: center; max-width: calc(80px * var(--card-scale));
}
.card-tag-sel option { background: #1e2336; color: #dde3f5; }
.card-del {
  position: absolute; top: -7px; left: -7px;
  width: 17px; height: 17px; border-radius: 50%;
  background: rgba(220,50,80,.85); border: 1.5px solid rgba(255,255,255,.3);
  color: white; font-size: .55rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity .12s; z-index: 5;
}
.word-card:hover .card-del { opacity: 1; }

#draw-canvas { position: absolute; inset: 0; pointer-events: none; z-index: 20; }
#draw-canvas.drawing-mode { pointer-events: all; cursor: crosshair; }

#bottom {
  height: var(--bottom-h);
  background: #131726;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 0;
  padding: 0 16px; flex-shrink: 0; overflow-x: auto;
}
#card-size-slider { width: 80px; accent-color: var(--accent); cursor: pointer; }
#card-size-label  { font-size: .72rem; color: var(--muted); min-width: 28px; }
#palette { display: flex; gap: 7px; align-items: center; }
.palette-label { font-size: .68rem; font-weight: 700; color: var(--muted); margin-right: 4px; text-transform: uppercase; letter-spacing: .7px; }
.swatch {
  width: 32px; height: 32px; border-radius: 8px; cursor: pointer;
  border: 2px solid transparent; transition: transform .12s, border-color .12s; flex-shrink: 0;
}
.swatch:hover { transform: scale(1.18); }
.swatch.selected { border-color: #fff; transform: scale(1.18); box-shadow: 0 0 0 2px rgba(255,255,255,.3); }
.swatch.no-color { background: var(--panel) !important; border: 2px dashed var(--border) !important; color: var(--muted); font-size: .7rem; display:flex; align-items:center; justify-content:center; }
#custom-swatch-wrap { position: relative; }
#custom-swatch-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
#custom-swatch-display { width: 32px; height: 32px; border-radius: 8px; border: 2px solid var(--border); background: conic-gradient(red,yellow,lime,cyan,blue,magenta,red); cursor: pointer; }
.bot-sep { width: 1px; height: 40px; background: var(--border); margin: 0 14px; }
#draw-tools { display: flex; gap: 8px; align-items: center; }
#draw-color-input { width: 28px; height: 28px; border: none; border-radius: 6px; cursor: pointer; }
#draw-size { width: 60px; accent-color: var(--accent); }

#toast {
  position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%) translateY(10px);
  background: #252d44; color: var(--text); padding: 8px 18px; border-radius: 8px;
  font-size: .82rem; border: 1px solid var(--border); opacity: 0; pointer-events: none;
  transition: all .22s; z-index: 9999; white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

#canvas-hint {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  text-align: center; color: #2a3050; pointer-events: none; user-select: none;
}
#canvas-hint .big { font-size: 2.5rem; }
#canvas-hint p { font-size: .85rem; margin-top: 8px; line-height: 1.6; }

#mode-indicator {
  position: absolute; top: 10px; right: 14px; z-index: 100;
  background: rgba(91,140,255,.15); border: 1px solid rgba(91,140,255,.4);
  border-radius: 7px; padding: 5px 12px; font-size: .75rem; font-weight: 700;
  color: var(--accent); display: none;
}
#file-import { display: none; }

/* ═══ SMARTBOARD / TOUCH OPTIMIERUNGEN ═══ */

/* Touch-Callout und Textauswahl global deaktivieren */
* { -webkit-touch-callout: none; }

/* Toolbar-Buttons auf Touchscreens größer */
@media (pointer: coarse) {
  :root {
    --toolbar-h: 68px;
    --bottom-h: 110px;
  }
  .tbtn {
    padding: 10px 16px;
    font-size: .85rem;
    min-height: 44px;
  }
  #toolbar h1 { font-size: 1.05rem; }
  #sentence-input { padding: 10px 14px; font-size: 1rem; min-height: 44px; }
  #card-size-slider { width: 100px; height: 28px; }
}

/* Resize-Handles auf Touch vergrößern */
@media (pointer: coarse) {
  .rh-n  { height: 22px; top: -11px; }
  .rh-s  { height: 22px; bottom: -11px; top: auto; }
  .rh-w  { width: 22px; left: -11px; }
  .rh-e  { width: 22px; right: -11px; left: auto; }
  .rh-nw { width: 28px; height: 28px; top: -14px; left: -14px; }
  .rh-ne { width: 28px; height: 28px; top: -14px; right: -14px; }
  .rh-sw { width: 28px; height: 28px; bottom: -14px; left: -14px; }
  .rh-se { width: 28px; height: 28px; bottom: -14px; right: -14px; }
}

/* Loeschen-Button auf Touch immer sichtbar und groesser */
@media (pointer: coarse) {
  .card-del {
    opacity: 1 !important;
    width: 28px; height: 28px;
    top: -12px; left: -12px;
    font-size: .85rem;
  }
  .del-zone {
    opacity: 1 !important;
    font-size: .85rem;
    padding: 4px 8px;
  }
  .pos-zone .rh { opacity: 1; }
}

/* touch-action fuer alle draggable Elemente */
.word-card   { touch-action: none; }
.pos-zone    { touch-action: none; }
.rh          { touch-action: none; }
#draw-canvas { touch-action: none; }
#canvas      { touch-action: none; }

/* Wortkarten auf Smartboard etwas groesser */
@media (pointer: coarse) {
  :root { --card-scale: 1.2; }
}
</style>
</head>

  <h1>Bebo Satzbau-Trainer</h1>
  <div class="sep"></div>

  <div id="sentence-bar">
    <input id="sentence-input" type="text" placeholder="Satz eingeben und Enter drücken …"/>
    <button class="tbtn active" onclick="parseSentence()">→ Wörter erzeugen</button>
  </div>
  <button class="tbtn" id="btn-zones" onclick="toggleZoneMode()">☐ Positionen</button>
  <button class="tbtn" onclick="addZone()">+ Zone</button>
  <div class="sep"></div>

  <button class="tbtn" id="btn-draw" onclick="toggleDraw()">✏ Freihand</button>
  <button class="tbtn" id="btn-erase" onclick="toggleErase()">◻ Löschen</button>
  <button class="tbtn danger" onclick="clearDrawing()">✕ Zeichnung</button>
  <div class="sep"></div>

  <button class="tbtn" onclick="saveSession()">💾 Speichern</button>
  <button class="tbtn" onclick="document.getElementById(\'file-import\').click()">📂 Laden</button>
  <input type="file" id="file-import" accept=".json" onchange="loadSession(event)"/>
  <div class="sep"></div>
  <button class="tbtn danger" onclick="clearCanvas()">✕ Canvas</button>
</div>

<div id="main">
  <div id="canvas">
    <canvas id="draw-canvas"></canvas>

    <div id="mode-indicator">✏ FREIHAND-MODUS</div>
  </div>
</div>

<div id="bottom">
  <span class="palette-label">Farbe</span>
  <div id="palette"></div>
  <div id="custom-swatch-wrap" title="Eigene Farbe">
    <div id="custom-swatch-display"></div>
    <input type="color" id="custom-swatch-input" onchange="pickCustomColor(event)"/>
  </div>
  <div class="bot-sep"></div>
  <span class="palette-label">Stift</span>
  <div id="draw-tools">
    <input type="color" id="draw-color-input" value="#ffdd33" title="Stiftfarbe"/>
    <input type="range" id="draw-size" min="1" max="24" value="4" title="Stiftgröße"/>
    <span style="font-size:.72rem;color:var(--muted);" id="draw-size-label">4px</span>
  </div>
  <div class="bot-sep"></div>
  <span class="palette-label">Kartengröße</span>
  <input type="range" id="card-size-slider" min="60" max="400" value="100" oninput="onCardSizeChange(this.value)"/>
  <span id="card-size-label">100%</span>
</div>

<div id="toast"></div>

<script>
const WORTARTEN = ['–','Artikel','Nomen','Verb','Adjektiv','Adverb','Präposition','Pronomen','Konjunktion','Partikel','Numerale'];
const COLORS = ['#00e5ff','#ffe600','#ff1aff','#ff6600','#8000ff','#00ff88','#ff1a1a','#ff69b4','#1a8cff','#ffffff'];
const COLOR_NAMES = ['Blau','Rot','Orange','Grün','Lila','Cyan','Orange2','Gelb','Grau','Weiß'];

let words = [];
let cards = [];
let zones = [];
let selectedColor = null;
let colorMode = false;
let drawMode = false;
let eraseMode = false;
let cardCounter = 0, zoneCounter = 0;

// ═══ UNDO ═══

function getState() {
  return {
    cards: cards.map(c => ({
      id: c.id,
      text: c.text,
      color: c.color,
      tag: c.el.querySelector('.card-tag-sel').value,
      x: c.x,
      y: c.y
    })),
    zones: zones.map(z => ({
      id: z.id,
      label: z.el.querySelector('.pos-zone-label').textContent,
      x: parseInt(z.el.style.left),
      y: parseInt(z.el.style.top),
      w: parseInt(z.el.style.width),
      h: parseInt(z.el.style.height),
      color: z.color || null
    })),
    cardCounter,
    zoneCounter,
    cardSize: document.getElementById('card-size-slider').value
  };
}



function restoreState(state) {
  cards.forEach(c => c.el.remove());
  zones.forEach(z => z.el.remove());
  cards = [];
  zones = [];
  cardCounter = state.cardCounter;
  zoneCounter = state.zoneCounter;
  state.zones.forEach(z => {
    const zone = createZone(z.label, z.x, z.y, z.w, z.h, z.color);
    zone.id = z.id;
    zone.el.id = z.id;
  });
  state.cards.forEach(c => {
    const w = { id: 'w' + cardCounter++, text: c.text, color: c.color };
    const card = placeCard(w, c.x, c.y);
    card.id = c.id;
    card.el.id = c.id;
    card.el.querySelector('.card-tag-sel').value = c.tag || '–';
  });
  if (state.cardSize) {
    document.getElementById('card-size-slider').value = state.cardSize;
    onCardSizeChange(state.cardSize);
  }
  updateHint();
}



// ═══ CANVAS + CTX ═══
const canvas = document.getElementById('canvas');
const drawCanvas = document.getElementById('draw-canvas');
const ctx = drawCanvas.getContext('2d');
let isDrawing = false, lastX = 0, lastY = 0;

// ═══ INIT ═══
function init() {
  buildPalette();
  resizeDrawCanvas();
  window.addEventListener('resize', resizeDrawCanvas);
  document.getElementById('sentence-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') parseSentence();
  });
  document.getElementById('draw-size').addEventListener('input', e => {
    document.getElementById('draw-size-label').textContent = e.target.value + 'px';
  });
  setupDrawing();
  createZone('Subjekt', 20, 40, 220, 180, '#3a6bc4');
  createZone('Prädikat', 260, 40, 220, 180, '#3aaa64');
  createZone('Objekt', 500, 40, 220, 180, '#e07a20');
}

// ═══ PALETTE ═══
function buildPalette() {
  const p = document.getElementById('palette');
  COLORS.forEach((c, i) => {
    const s = document.createElement('div');
    s.className = 'swatch';
    s.style.background = c;
    if (c === '#ffffff') s.style.border = '2px solid #555';
    s.title = COLOR_NAMES[i];
    s.dataset.color = c;
    s.addEventListener('click', () => selectColor(c, s));
    p.appendChild(s);
  });
  const nc = document.createElement('div');
  nc.className = 'swatch no-color';
  nc.textContent = '✕';
  nc.title = 'Farbe entfernen';
  nc.addEventListener('click', () => selectColor(null, nc));
  p.appendChild(nc);
}

function selectColor(c, swatchEl) {
  selectedColor = c;
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
  if (swatchEl) swatchEl.classList.add('selected');
  colorMode = 'card';
  canvas.style.cursor = 'crosshair';
  toast('Farbe gewählt – Wort oder Zone anklicken');
}

function pickCustomColor(e) {
  const c = e.target.value;
  document.getElementById('custom-swatch-display').style.background = c;
  selectColor(c, null);
  document.getElementById('custom-swatch-display').style.outline = '2px solid white';
}

// ═══ PARSE SENTENCE ═══
function parseSentence() {
  const input = document.getElementById('sentence-input');
  const raw = input.value.trim();
  if (!raw) return;
  const tokens = raw.split(/\s+/).filter(t => t.length > 0);
  if (!tokens.length) return;

  const colorCycle = ['#00e5ff','#ffe600','#ff1aff','#ff6600','#8000ff','#00ff88','#ff1a1a','#ff69b4','#1a8cff','#ffffff'];
  let ci = 0;
  tokens.forEach(t => {
    words.push({ id: 'w' + cardCounter++, text: t, color: colorCycle[ci++ % colorCycle.length] });
  });

  const cr = canvas.getBoundingClientRect();
  const startX = 40, startY = 40;
  const placed = words.slice(-tokens.length);
  let cx = startX;
  placed.forEach(w => {
    const approxW = Math.max(60, w.text.length * 13 + 32);
    placeCard(w, cx, startY);
    cx += approxW + 14;
    if (cx > cr.width - 100) { cx = startX; }
  });

  hideHint();
  input.value = '';
  toast(tokens.length + ' Wörter auf Canvas platziert ✓');
}

// ═══ PLACE CARD ═══
function placeCard(word, x, y) {
  const id = 'card-' + cardCounter++;
  const el = document.createElement('div');
  el.className = 'word-card';
  el.id = id;
  el.style.left = x + 'px';
  el.style.top  = y + 'px';
  el.style.background = word.color;

  const del = document.createElement('div');
  del.className = 'card-del';
  del.textContent = '✕';
  del.addEventListener('click', ev => {
    ev.stopPropagation();
    removeCard(id);
  });
  el.appendChild(del);

  const wt = document.createElement('span');
  wt.className = 'wt';
  wt.textContent = word.text;
  el.appendChild(wt);

  const sel = document.createElement('select');
  sel.className = 'card-tag-sel';
  WORTARTEN.forEach(wa => {
    const o = document.createElement('option');
    o.value = wa; o.textContent = wa;
    sel.appendChild(o);
  });
  sel.addEventListener('change', ev => {
    ev.stopPropagation();
    const card = cards.find(c => c.id === id);
    if (card) card.tag = sel.value;
  });
  sel.addEventListener('mousedown', ev => ev.stopPropagation());
  sel.addEventListener('touchstart', ev => ev.stopPropagation(), { passive: false });
  el.appendChild(sel);

  const cardInteract = ev => {
    if (ev.target === del || ev.target === sel) return;
    if (colorMode) {
      ev.stopPropagation();
      ev.preventDefault();
      applyColorToCard(id);
      return;
    }
    startDragCard(ev, id, el);
  };
  el.addEventListener('mousedown', cardInteract);
  el.addEventListener('touchstart', cardInteract, { passive: false });

  canvas.appendChild(el);
  const card = { id, wordId: word.id, text: word.text, color: word.color, tag: '–', x, y, el };
  cards.push(card);
  return card;
}

function applyColorToCard(id) {
  const card = cards.find(c => c.id === id);
  if (!card) return;
  card.color = selectedColor === null ? '#4a5070' : selectedColor;
  card.el.style.background = card.color;
  card.el.classList.add('color-target-active');
  setTimeout(() => card.el.classList.remove('color-target-active'), 400);
}

function applyColorToZone(id) {
  const zone = zones.find(z => z.id === id);
  if (!zone) return;
  zone.color = selectedColor;
  if (selectedColor === null) {
    zone.el.style.background = 'transparent';
    zone.el.style.borderColor = '#5b8cff55';
  } else {
    const r = parseInt(selectedColor.slice(1,3),16);
    const g = parseInt(selectedColor.slice(3,5),16);
    const b = parseInt(selectedColor.slice(5,7),16);
    zone.el.style.background = `rgba(${r},${g},${b},0.18)`;
    zone.el.style.borderColor = `rgba(${r},${g},${b},0.6)`;
  }
  zone.el.classList.add('color-target-active');
  setTimeout(() => zone.el.classList.remove('color-target-active'), 400);
}

function removeCard(id) {
  const idx = cards.findIndex(c => c.id === id);
  if (idx === -1) return;
  cards[idx].el.remove();
  cards.splice(idx, 1);
  updateHint();
}

// ═══ DRAG CARDS ═══
function getEvtCoords(e) {
  if (e.touches && e.touches.length > 0) return { clientX: e.touches[0].clientX, clientY: e.touches[0].clientY };
  if (e.changedTouches && e.changedTouches.length > 0) return { clientX: e.changedTouches[0].clientX, clientY: e.changedTouches[0].clientY };
  return { clientX: e.clientX, clientY: e.clientY };
}

let _activeDrag = false;

function startDragCard(ev, cardId, el) {
  if (ev.type === 'mousedown' && ev.button !== 0) return;
  if (_activeDrag) return;
  _activeDrag = true;
  ev.preventDefault();
  const { clientX: startCX, clientY: startCY } = getEvtCoords(ev);
  const rect = el.getBoundingClientRect();
  const ox = startCX - rect.left;
  const oy = startCY - rect.top;
  let moved = false;
  const sx = startCX, sy = startCY;

  el.style.zIndex = 50;

  const onMove = e => {
    e.preventDefault();
    const { clientX, clientY } = getEvtCoords(e);
    if (!moved && (Math.abs(clientX-sx)>5||Math.abs(clientY-sy)>5)) moved = true;
    if (!moved) return;
    const cr = canvas.getBoundingClientRect();
    const nx = clientX - cr.left - ox;
    const ny = clientY - cr.top - oy;
    el.style.left = nx + 'px';
    el.style.top  = ny + 'px';
    const card = cards.find(c => c.id === cardId);
    if (card) { card.x = nx; card.y = ny; }
  };
  const onUp = () => {
    _activeDrag = false;
    el.style.zIndex = 30;
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', onUp);
  };
  document.addEventListener('mousemove', onMove, { passive: false });
  document.addEventListener('mouseup', onUp);
  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('touchend', onUp);
}

// ═══ CANVAS CLICK ═══
canvas.addEventListener('touchstart', ev => {
  if (drawMode || eraseMode) return;
  if (ev.target === canvas || ev.target === drawCanvas) {
    if (colorMode) {
      colorMode = false;
      canvas.style.cursor = 'default';
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
      document.getElementById('custom-swatch-display').style.outline = 'none';
    }
  }
}, { passive: true });
canvas.addEventListener('mousedown', ev => {
  if (drawMode || eraseMode) return;
  if (ev.target === canvas || ev.target === drawCanvas) {
    if (colorMode) {
      colorMode = false;
      canvas.style.cursor = 'default';
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
      document.getElementById('custom-swatch-display').style.outline = 'none';
    }
  }
});

// ═══ ZONES ═══
let zoneEditMode = false;
function toggleZoneMode() {
  zoneEditMode = !zoneEditMode;
  document.getElementById('btn-zones').classList.toggle('active', zoneEditMode);
  toast(zoneEditMode ? 'Zonen-Modus aktiv' : 'Zonen-Modus deaktiviert');
}

function addZone() {
  const count = zones.length + 1;
  const cr = canvas.getBoundingClientRect();
  const x = 40 + ((count - 1) % 8) * (Math.min(cr.width, 900) / 8.5);
  const y = 120 + Math.floor((count - 1) / 8) * 180;
  createZone('Pos. ' + count, x, y, 110, 140, null);
}

function createZone(label, x, y, w, h, color) {
  const id = 'zone-' + zoneCounter++;
  const el = document.createElement('div');
  el.className = 'pos-zone';
  el.id = id;
  el.style.left = x + 'px'; el.style.top = y + 'px';
  el.style.width = w + 'px'; el.style.height = h + 'px';

  if (color) {
    const r = parseInt(color.slice(1,3),16);
    const g = parseInt(color.slice(3,5),16);
    const b = parseInt(color.slice(5,7),16);
    el.style.background = `rgba(${r},${g},${b},0.18)`;
    el.style.borderColor = `rgba(${r},${g},${b},0.6)`;
  }

  const lbl = document.createElement('div');
  lbl.className = 'pos-zone-label';
  lbl.textContent = label;
  lbl.contentEditable = true;
  lbl.spellcheck = false;
  lbl.addEventListener('blur', () => {});
  el.appendChild(lbl);

  const delBtn = document.createElement('div');
  delBtn.className = 'del-zone';
  delBtn.textContent = '✕';
  delBtn.title = 'Zone löschen';
  delBtn.addEventListener('click', ev => {
    ev.stopPropagation();
    removeZone(id);
  });
  el.appendChild(delBtn);

  const HANDLES = [
    { cls:'rh rh-n', dir:'n'  }, { cls:'rh rh-s', dir:'s'  },
    { cls:'rh rh-w', dir:'w'  }, { cls:'rh rh-e', dir:'e'  },
    { cls:'rh rh-nw',dir:'nw'}, { cls:'rh rh-ne',dir:'ne'  },
    { cls:'rh rh-sw',dir:'sw'}, { cls:'rh rh-se',dir:'se'  },
  ];

  HANDLES.forEach(({ cls, dir }) => {
    const h = document.createElement('div');
    h.className = cls;
    const handleInteract = ev => {
      ev.stopPropagation(); ev.preventDefault();
      const { clientX: startX, clientY: startY } = getEvtCoords(ev);
      const startL = parseInt(el.style.left), startT = parseInt(el.style.top);
      const startW = parseInt(el.style.width), startH = parseInt(el.style.height);
      const onMove = e => {
        e.preventDefault();
        const { clientX: eX, clientY: eY } = getEvtCoords(e);
        const dx = eX - startX, dy = eY - startY;
        if (dir.includes('e')) el.style.width  = Math.max(60, startW + dx) + 'px';
        if (dir.includes('s')) el.style.height = Math.max(50, startH + dy) + 'px';
        if (dir.includes('w')) {
          const nw = Math.max(60, startW - dx);
          el.style.width = nw + 'px'; el.style.left = (startL + startW - nw) + 'px';
        }
        if (dir.includes('n')) {
          const nh = Math.max(50, startH - dy);
          el.style.height = nh + 'px'; el.style.top = (startT + startH - nh) + 'px';
        }
      };
      const onUp = () => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        document.removeEventListener('touchmove', onMove);
        document.removeEventListener('touchend', onUp);
      };
      document.addEventListener('mousemove', onMove, { passive: false });
      document.addEventListener('mouseup', onUp);
      document.addEventListener('touchmove', onMove, { passive: false });
      document.addEventListener('touchend', onUp);
    };
    h.addEventListener('mousedown', handleInteract);
    h.addEventListener('touchstart', handleInteract, { passive: false });
    el.appendChild(h);
  });

  const zoneInteract = ev => {
    if (ev.target === lbl || ev.target === delBtn || ev.target.classList.contains('rh')) return;
    if (colorMode) {
      ev.stopPropagation(); ev.preventDefault();
      applyColorToZone(id);
      return;
    }
    if (drawMode || eraseMode) return;
    ev.preventDefault();
    const rect = el.getBoundingClientRect();
    const { clientX: startX0, clientY: startY0 } = getEvtCoords(ev);
    const ox = startX0 - rect.left, oy = startY0 - rect.top;
    const onMove = e => {
      e.preventDefault();
      const { clientX, clientY } = getEvtCoords(e);
      const cr = canvas.getBoundingClientRect();
      el.style.left = (clientX - cr.left - ox) + 'px';
      el.style.top  = (clientY - cr.top  - oy) + 'px';
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend', onUp);
    };
    document.addEventListener('mousemove', onMove, { passive: false });
    document.addEventListener('mouseup', onUp);
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend', onUp);
  };
  el.addEventListener('mousedown', zoneInteract);
  el.addEventListener('touchstart', zoneInteract, { passive: false });

  canvas.appendChild(el);
  const zone = { id, label, x, y, w, h, color: color || null, el };
  zones.push(zone);
  return zone;
}

function removeZone(id) {
  const idx = zones.findIndex(z => z.id === id);
  if (idx === -1) return;
  zones[idx].el.remove();
  zones.splice(idx, 1);
}

// ═══ DRAW ═══
function resizeDrawCanvas() {
  const rect = canvas.getBoundingClientRect();
  const img = ctx.getImageData(0, 0, drawCanvas.width, drawCanvas.height);
  drawCanvas.width  = rect.width;
  drawCanvas.height = rect.height;
  ctx.putImageData(img, 0, 0);
}

function setupDrawing() {
  function drawStart(e) {
    if (!drawMode && !eraseMode) return;
    e.preventDefault();
    isDrawing = true;
    const r = drawCanvas.getBoundingClientRect();
    const { clientX, clientY } = getEvtCoords(e);
    lastX = clientX - r.left; lastY = clientY - r.top;
  }
  function drawMove(e) {
    if (!isDrawing) return;
    e.preventDefault();
    const r = drawCanvas.getBoundingClientRect();
    const { clientX, clientY } = getEvtCoords(e);
    const x = clientX - r.left, y = clientY - r.top;
    ctx.lineJoin = 'round'; ctx.lineCap = 'round';
    if (eraseMode) {
      const sz = parseInt(document.getElementById('draw-size').value) * 3;
      ctx.clearRect(x - sz/2, y - sz/2, sz, sz);
    } else {
      ctx.strokeStyle = document.getElementById('draw-color-input').value;
      ctx.lineWidth = parseInt(document.getElementById('draw-size').value);
      ctx.globalAlpha = 0.85;
      ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(x, y); ctx.stroke();
    }
    lastX = x; lastY = y;
  }
  function drawEnd() { isDrawing = false; }
  drawCanvas.addEventListener('mousedown',  drawStart);
  drawCanvas.addEventListener('mousemove',  drawMove);
  drawCanvas.addEventListener('mouseup',    drawEnd);
  drawCanvas.addEventListener('mouseleave', drawEnd);
  drawCanvas.addEventListener('touchstart', drawStart, { passive: false });
  drawCanvas.addEventListener('touchmove',  drawMove,  { passive: false });
  drawCanvas.addEventListener('touchend',   drawEnd);
  drawCanvas.addEventListener('touchcancel',drawEnd);
}

function toggleDraw() {
  drawMode = !drawMode; eraseMode = false;
  document.getElementById('btn-draw').classList.toggle('active', drawMode);
  document.getElementById('btn-erase').classList.remove('active');
  drawCanvas.classList.toggle('drawing-mode', drawMode);
  const ind = document.getElementById('mode-indicator');
  ind.style.display = drawMode ? 'block' : 'none';
  ind.textContent = '✏ FREIHAND-MODUS';
  canvas.style.cursor = drawMode ? 'crosshair' : 'default';
  if (drawMode) { colorMode = false; toast('Freihand-Modus aktiv'); }
}

function toggleErase() {
  eraseMode = !eraseMode; drawMode = false;
  document.getElementById('btn-erase').classList.toggle('active', eraseMode);
  document.getElementById('btn-draw').classList.remove('active');
  drawCanvas.classList.toggle('drawing-mode', eraseMode);
  const ind = document.getElementById('mode-indicator');
  ind.style.display = eraseMode ? 'block' : 'none';
  ind.textContent = '◻ RADIERER-MODUS';
  canvas.style.cursor = eraseMode ? 'cell' : 'default';
}

function clearDrawing() {
  ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  toast('Zeichnung gelöscht');
}

// ═══ CLEAR CANVAS ═══
function clearCanvas() {
  cards.forEach(c => c.el.remove()); cards = [];
  zones.forEach(z => z.el.remove()); zones = [];
  clearDrawing();
  updateHint();
  toast('Canvas geleert');
}

// ═══ CARD SIZE ═══
function onCardSizeChange(val) {
  const scale = val / 100;
  document.documentElement.style.setProperty('--card-scale', scale);
  document.getElementById('card-size-label').textContent = val + '%';
}

// ═══ SAVE / LOAD ═══
function saveSession() {
  const drawData = drawCanvas.toDataURL();
  const session = {
    version: 3,
    cardSize: document.getElementById('card-size-slider').value,
    cards: cards.map(c => ({ text: c.text, color: c.color, tag: c.el.querySelector('.card-tag-sel').value, x: c.x, y: c.y })),
    zones: zones.map(z => ({
      label: z.el.querySelector('.pos-zone-label').textContent,
      x: parseInt(z.el.style.left), y: parseInt(z.el.style.top),
      w: parseInt(z.el.style.width), h: parseInt(z.el.style.height),
      color: z.color || null
    })),
    drawing: drawData
  };
  const blob = new Blob([JSON.stringify(session, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'syntax-session-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  toast('Sitzung gespeichert ✓');
}

function loadSession(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const session = JSON.parse(e.target.result);
      cards.forEach(c => c.el.remove()); cards = [];
      zones.forEach(z => z.el.remove()); zones = [];
      clearDrawing();
      if (session.cardSize) { document.getElementById('card-size-slider').value = session.cardSize; onCardSizeChange(session.cardSize); }
      if (session.zones) session.zones.forEach(z => createZone(z.label, z.x, z.y, z.w, z.h, z.color || null));
      if (session.cards) session.cards.forEach(c => {
        const w = { id: 'w'+cardCounter++, text: c.text, color: c.color };
        const card = placeCard(w, c.x, c.y);
        card.el.querySelector('.card-tag-sel').value = c.tag || '–';
      });
      if (session.drawing) {
        const img = new Image();
        img.onload = () => ctx.drawImage(img, 0, 0);
        img.src = session.drawing;
      }
      hideHint();
      toast('Sitzung geladen ✓');
    } catch(err) { toast('Fehler beim Laden'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ═══ HINT ═══
function hideHint() { document.getElementById('canvas-hint').style.display = 'none'; }
function updateHint() { document.getElementById('canvas-hint').style.display = cards.length === 0 && zones.length === 0 ? '' : 'none'; }

// ═══ TOAST ═══
let toastTimer;
function toast(msg) {
  clearTimeout(toastTimer);
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}

// ═══ KEYBOARD ═══
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); return; }
  if (['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)) return;
  if (e.key === 'Escape') {
    colorMode = false; drawMode = false; eraseMode = false;
    canvas.style.cursor = 'default';
    drawCanvas.classList.remove('drawing-mode');
    document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('active'));
    document.getElementById('mode-indicator').style.display = 'none';
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
  }
});

init();
</script>
